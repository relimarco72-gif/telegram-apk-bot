<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AEMODE ULTIMATE</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; background: #020205; color: #fff; font-family: system-ui, -apple-system, sans-serif; overflow: hidden; height: 100vh; display: flex; align-items: center; justify-content: center; }
        #stars { position: fixed; top: 0; left: 0; z-index: -1; width: 100%; height: 100%; }
        .card { background: rgba(10, 10, 25, 0.9); border: 2px solid #00d2ff; border-radius: 35px; padding: 40px 25px; text-align: center; backdrop-filter: blur(20px); box-shadow: 0 0 50px rgba(0, 210, 255, 0.2); width: 85%; max-width: 360px; position: relative; border-bottom: 5px solid #00d2ff; }
        
        /* القفل المتحرك */
        .lock-box { font-size: 70px; cursor: pointer; transition: 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55); display: inline-block; margin-bottom: 10px; filter: drop-shadow(0 0 10px #ffcc00); }
        .lock-box:hover { transform: scale(1.2) rotate(-10deg); }

        h1 { font-size: 35px; font-weight: 900; background: linear-gradient(90deg, #00d2ff, #9d00ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 10px 0; letter-spacing: 5px; }
        p { color: #888; font-size: 13px; line-height: 1.5; margin-bottom: 25px; }

        .btn { background: linear-gradient(45deg, #00d2ff, #0072ff); border: none; color: white; padding: 18px; border-radius: 20px; font-size: 17px; font-weight: bold; cursor: pointer; transition: 0.3s; width: 100%; box-shadow: 0 10px 20px rgba(0, 210, 255, 0.3); }
        .btn:active { transform: scale(0.96); }
        .btn:disabled { background: #222; color: #555; box-shadow: none; }

        #fallback-btn { display: none; margin-top: 15px; background: none; border: 1px dashed #555; color: #555; font-size: 11px; padding: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <canvas id="stars"></canvas>
    <div class="card">
        <div id="lock" class="lock-box" onclick="toggleLock()">🔒</div>
        <h1>AEMODE</h1>
        <p>النظام مشفر حالياً. شاهد الإعلان السريع لفك التشفير وإرسال الملف فوراً.</p>
        
        <button id="mainBtn" class="btn" onclick="startAd()" disabled>⏳ جاري التهيئة...</button>
        <button id="fallback-btn" onclick="forceUnlock()">⚡ تشغيل يدوي (إذا تعطل التحميل)</button>
    </div>

    <script src='https://alwingulla.com/act/files/tag.min.js?z=10682642' data-cfasync='false' async></script>

    <script>
        const tele = window.Telegram.WebApp;
        tele.ready();
        tele.expand();

        // فحص تحميل الإعلان
        let checkCount = 0;
        const checkTimer = setInterval(() => {
            checkCount++;
            if (typeof show_10682642 === 'function') {
                clearInterval(checkTimer);
                document.getElementById('mainBtn').disabled = false;
                document.getElementById('mainBtn').innerText = "🔓 فتح القفل الآن";
            }
            if (checkCount > 10) { // بعد 10 ثوانٍ يظهر زر الطوارئ
                document.getElementById('fallback-btn').style.display = "inline-block";
                document.getElementById('mainBtn').innerText = "⚠️ النظام بطيء...";
            }
        }, 1000);

        function startAd() {
            show_10682642().then(() => {
                onSuccess();
            }).catch(() => {
                alert("يرجى إكمال الإعلان");
            });
        }

        function forceUnlock() {
            // حل بديل في حال تعطل الإعلان لضمان عمل الواجهة
            onSuccess();
        }

        function onSuccess() {
            const lock = document.getElementById('lock');
            lock.innerText = "🔓";
            lock.style.filter = "drop-shadow(0 0 20px #00ff00)";
            document.getElementById('mainBtn').innerText = "✅ اكتمل الفك!";
            document.getElementById('mainBtn').style.background = "#00ff00";
            
            tele.HapticFeedback.notificationOccurred('success');
            tele.sendData('view_completed');
            setTimeout(() => tele.close(), 1500);
        }

        function toggleLock() {
            tele.HapticFeedback.impactOccurred('medium');
            const lock = document.getElementById('lock');
            lock.style.transform = "scale(1.3)";
            setTimeout(() => lock.style.transform = "scale(1)", 200);
        }

        // أنميشن النجوم
        const canvas = document.getElementById('stars');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let p = Array.from({length: 100}, () => ({x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*2, s: Math.random()*0.5}));
        function draw() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = "#00d2ff";
            p.forEach(s => {
                ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
                s.y += s.s; if(s.y > canvas.height) s.y = 0;
            });
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
