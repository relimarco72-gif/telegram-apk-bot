<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AEMODE - Ultra Premium Unlock</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
    <script src='https://libtl.com/sdk.js' data-zone='10682642' data-sdk='show_10682642'></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;user-select:none;-webkit-tap-highlight-color:transparent}
:root{
    --c1:#00f0ff;--c2:#a855f7;--c3:#ec4899;--c4:#facc15;
    --bg:#030308;--card:rgba(12,12,25,0.6);
    --gb:rgba(255,255,255,0.04);--gbb:rgba(255,255,255,0.06);
}
body{background:var(--bg);color:#fff;font-family:'Cairo','Outfit',sans-serif;
    height:100vh;height:100dvh;overflow:hidden;display:flex;flex-direction:column;
    align-items:center;justify-content:center}

/* ══ Mesh Gradient BG ══ */
.mesh-bg{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.mesh-orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.18;
    animation:orbDrift 12s ease-in-out infinite alternate}
.mesh-orb:nth-child(1){width:350px;height:350px;background:var(--c1);top:-10%;left:-10%;animation-duration:10s}
.mesh-orb:nth-child(2){width:300px;height:300px;background:var(--c2);bottom:-5%;right:-5%;animation-delay:-5s;animation-duration:14s}
.mesh-orb:nth-child(3){width:250px;height:250px;background:var(--c3);top:40%;left:50%;animation-delay:-3s;animation-duration:16s}
@keyframes orbDrift{0%{transform:translate(0,0) scale(1)}100%{transform:translate(60px,-50px) scale(1.3)}}

canvas#partCanvas{position:fixed;inset:0;z-index:1;pointer-events:none}

/* ══ Ripple ══ */
.rpl{position:fixed;border-radius:50%;pointer-events:none;z-index:998;
    animation:rplGrow .7s cubic-bezier(.2,1,.3,1) forwards}
@keyframes rplGrow{0%{width:0;height:0;opacity:.5}100%{width:250px;height:250px;opacity:0}}

/* ══ Wrapper ══ */
.wrap{position:relative;z-index:10;width:94%;max-width:400px;
    display:flex;flex-direction:column;gap:14px;
    animation:enterUp .7s cubic-bezier(.16,1,.3,1) both}
@keyframes enterUp{from{opacity:0;transform:translateY(50px) scale(.92)}to{opacity:1;transform:none}}

/* ══ Glass Card ══ */
.g-card{background:var(--card);backdrop-filter:blur(50px);-webkit-backdrop-filter:blur(50px);
    border:1px solid var(--gbb);border-radius:28px;padding:36px 24px 28px;
    text-align:center;position:relative;overflow:hidden;
    transform-style:preserve-3d;transition:transform .12s ease-out}
/* Animated border glow */
.g-card::before{content:'';position:absolute;inset:-1px;border-radius:28px;
    background:conic-gradient(from 0deg,var(--c1),var(--c2),var(--c3),var(--c4),var(--c1));
    opacity:.12;z-index:-2;animation:borderSpin 6s linear infinite}
@keyframes borderSpin{to{transform:rotate(360deg)}}
.g-card::after{content:'';position:absolute;inset:1px;border-radius:27px;
    background:var(--bg);z-index:-1}

/* ══ Logo Orb ══ */
.orb-wrap{position:relative;width:90px;height:90px;margin:0 auto 20px;cursor:pointer;
    transform:translateZ(50px);transition:transform .35s cubic-bezier(.34,1.56,.64,1)}
.orb-wrap:active{transform:translateZ(50px) scale(.88)}
.orb-ring{position:absolute;inset:-4px;border-radius:50%;
    background:conic-gradient(var(--c1),var(--c2),var(--c3),var(--c4),var(--c1));
    animation:spin 3s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.orb-inner{position:absolute;inset:3px;border-radius:50%;background:var(--bg);z-index:1;
    display:flex;align-items:center;justify-content:center}
.orb-pulse{position:absolute;inset:-12px;border-radius:50%;
    border:2px solid var(--c1);opacity:0;animation:orbPulse 2.5s ease-out infinite}
.orb-pulse:nth-child(3){animation-delay:.8s}
@keyframes orbPulse{0%{opacity:.4;transform:scale(.8)}100%{opacity:0;transform:scale(1.5)}}
.lock-em{font-size:40px;position:relative;z-index:2;
    filter:drop-shadow(0 0 12px var(--c1));transition:all .5s cubic-bezier(.34,1.56,.64,1)}
.lock-em.open{transform:scale(1.4) rotate(-20deg);filter:drop-shadow(0 0 25px #0f8)}

/* ══ Live Counter ══ */
.live-bar{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:16px}
.live-dot{width:7px;height:7px;border-radius:50%;background:#0f8;
    box-shadow:0 0 8px #0f8;animation:livePulse 1.5s infinite}
@keyframes livePulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.5)}}
.live-txt{font-size:11px;font-weight:700;letter-spacing:2px;
    color:rgba(255,255,255,.35);text-transform:uppercase}

/* ══ Badge ══ */
.badge{display:inline-flex;align-items:center;gap:6px;
    padding:5px 14px;border-radius:99px;
    background:linear-gradient(135deg,rgba(168,85,247,.1),rgba(0,240,255,.1));
    border:1px solid rgba(168,85,247,.25);
    font-size:10px;font-weight:900;letter-spacing:3px;color:var(--c2);
    text-transform:uppercase;margin-bottom:14px}

/* ══ Title ══ */
.ttl{font-family:'Cairo';font-size:26px;font-weight:900;margin-bottom:10px;
    background:linear-gradient(135deg,#fff,var(--c1),var(--c2));
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
    background-size:300% 300%;animation:shimmer 4s ease infinite}
@keyframes shimmer{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}

.desc{font-size:13.5px;line-height:1.7;color:rgba(255,255,255,.5);margin-bottom:24px}
.desc b{color:var(--c1);font-weight:700}

/* ══ Progress Ring ══ */
.prog-wrap{display:flex;align-items:center;justify-content:center;gap:10px;
    margin-bottom:22px;opacity:.7}
.prog-step{width:32px;height:4px;border-radius:99px;background:rgba(255,255,255,.08);
    position:relative;overflow:hidden;transition:all .3s}
.prog-step.done{background:var(--c1);box-shadow:0 0 8px rgba(0,240,255,.4)}
.prog-step.active{background:rgba(0,240,255,.2)}
.prog-step.active::after{content:'';position:absolute;inset:0;border-radius:99px;
    background:var(--c1);animation:progFill 2s ease-in-out infinite}
@keyframes progFill{0%{transform:scaleX(0);transform-origin:right}
    50%{transform:scaleX(1);transform-origin:right}
    51%{transform-origin:left}100%{transform:scaleX(0);transform-origin:left}}

/* ══ Main Button ══ */
.btn-m{position:relative;width:100%;padding:16px 20px;border:none;border-radius:16px;
    font-family:'Cairo';font-size:16px;font-weight:700;color:#000;cursor:pointer;
    background:linear-gradient(135deg,var(--c1),var(--c2));background-size:200% 200%;
    animation:grd 4s ease infinite;
    box-shadow:0 8px 32px rgba(0,240,255,.25),0 2px 8px rgba(168,85,247,.2);
    transition:all .25s;overflow:hidden}
.btn-m:active:not(:disabled){transform:scale(.95)}
.btn-m:disabled{background:#1a1a2e;color:rgba(255,255,255,.15);
    box-shadow:none;cursor:not-allowed;animation:none}
@keyframes grd{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.btn-m .sweep{position:absolute;top:0;left:-100%;width:60%;height:100%;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.3),transparent);
    animation:sw 2.5s ease-in-out infinite}
.btn-m:disabled .sweep{animation:none}
@keyframes sw{0%{left:-100%}40%{left:150%}100%{left:150%}}

/* ══ Retry ══ */
.btn-r{display:none;width:100%;padding:13px;margin-top:8px;
    border:1px solid rgba(255,255,255,.08);border-radius:14px;
    background:transparent;color:rgba(255,255,255,.4);font-family:'Cairo';
    font-size:13px;font-weight:700;cursor:pointer;transition:all .3s}
.btn-r:active{transform:scale(.95);background:rgba(255,255,255,.05)}

/* ══ Channel Card ══ */
.ch-card{background:var(--gb);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    border:1px solid var(--gbb);border-radius:20px;padding:14px 18px;
    display:flex;align-items:center;gap:12px;cursor:pointer;
    transition:all .3s;text-decoration:none;position:relative;overflow:hidden;
    animation:enterUp .7s cubic-bezier(.16,1,.3,1) .12s both}
.ch-card:active{transform:scale(.96);border-color:var(--c2)}
.ch-av{width:44px;height:44px;border-radius:13px;flex-shrink:0;
    background:linear-gradient(135deg,var(--c2),var(--c3));
    display:flex;align-items:center;justify-content:center;font-size:20px;
    box-shadow:0 4px 16px rgba(168,85,247,.3);position:relative;overflow:hidden}
.ch-av::after{content:'';position:absolute;inset:0;
    background:linear-gradient(180deg,rgba(255,255,255,.15),transparent);border-radius:13px}
.ch-info{flex:1;text-align:right}
.ch-name{font-size:14px;font-weight:700;color:#fff}
.ch-sub{font-size:11px;color:rgba(255,255,255,.35);margin-top:1px}
.ch-arr{width:28px;height:28px;border-radius:50%;
    background:rgba(168,85,247,.12);display:flex;align-items:center;justify-content:center;
    font-size:14px;color:var(--c2);transition:transform .3s}
.ch-card:active .ch-arr{transform:translateX(-3px)}

/* ══ Toast ══ */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(100px);
    padding:10px 22px;border-radius:14px;font-size:12px;font-weight:700;z-index:100;
    transition:transform .35s cubic-bezier(.34,1.56,.64,1);backdrop-filter:blur(15px);
    max-width:88%;text-align:center;white-space:nowrap}
.toast.on{transform:translateX(-50%) translateY(0)}
.toast.ld{background:rgba(0,240,255,.08);border:1px solid rgba(0,240,255,.2);color:var(--c1)}
.toast.er{background:rgba(236,72,153,.08);border:1px solid rgba(236,72,153,.2);color:var(--c3)}
.toast.ok{background:rgba(0,255,120,.08);border:1px solid rgba(0,255,120,.2);color:#0f8}

/* ══ Debug ══ */
#dbg{position:fixed;top:6px;left:6px;font-size:9px;font-family:'Outfit',monospace;
    color:rgba(255,255,255,.12);z-index:100;pointer-events:none;direction:ltr}

/* ══ Confetti ══ */
.confetti{position:fixed;pointer-events:none;z-index:999;font-size:20px;
    animation:confettiFall 2s ease-in forwards}
@keyframes confettiFall{
    0%{opacity:1;transform:translateY(0) rotate(0) scale(1)}
    100%{opacity:0;transform:translateY(100vh) rotate(720deg) scale(.3)}}
</style>
</head>
<body>
<!-- Mesh BG -->
<div class="mesh-bg"><div class="mesh-orb"></div><div class="mesh-orb"></div><div class="mesh-orb"></div></div>
<canvas id="partCanvas"></canvas>
<div id="dbg">AE</div>

<div class="wrap" id="wrap">
    <div class="g-card" id="card">
        <!-- Orb -->
        <div class="orb-wrap" id="orb">
            <div class="orb-ring"></div>
            <div class="orb-pulse"></div>
            <div class="orb-pulse"></div>
            <div class="orb-inner"><span class="lock-em" id="lck">🔒</span></div>
        </div>

        <!-- Live -->
        <div class="live-bar"><div class="live-dot"></div><span class="live-txt">مباشر • نظام مفتوح</span></div>

        <div class="badge">⚡ AEMODE ELITE</div>
        <h1 class="ttl">ساهم لفك القفل</h1>
        <p class="desc">شاهد إعلاناً قصيراً وساهم في <b>فتح الملف</b> للجميع.<br>
            <span style="opacity:.55;font-size:11.5px">كل مشاهدة تقرّبنا من الهدف ✨</span></p>

        <!-- Steps -->
        <div class="prog-wrap" id="progWrap">
            <div class="prog-step done"></div>
            <div class="prog-step active"></div>
            <div class="prog-step"></div>
        </div>

        <button class="btn-m" id="mbtn"><span class="sweep"></span><span id="mbl">▶ شاهد العرض للفتح</span></button>
        <button class="btn-r" id="rbtn">🔄 أعد المحاولة</button>
    </div>

    <!-- Channel -->
    <a class="ch-card" id="chCard" href="https://t.me/AE_MODE_apk" target="_blank" rel="noopener">
        <div class="ch-av">🚀</div>
        <div class="ch-info">
            <div class="ch-name">AE MODE • القناة الرسمية</div>
            <div class="ch-sub">انضم الآن • ملفات ومحتوى حصري 🔥</div>
        </div>
        <div class="ch-arr">←</div>
    </a>
</div>

<div class="toast" id="toast"></div>

<script>
(()=>{
    const tg=window.Telegram.WebApp;
    tg.expand();tg.ready();
    try{tg.setHeaderColor('#030308');tg.setBackgroundColor('#030308')}catch(e){}
    const H=tg.HapticFeedback||null;
    const dbg=document.getElementById('dbg');
    const log=m=>{console.log('[AE]',m);dbg.textContent=m};
    log('SYS OK');

    // ═══ Particle Engine ═══
    const cv=document.getElementById('partCanvas'),cx=cv.getContext('2d');
    let W,HH,pts=[],tp={x:null,y:null};

    function rsz(){W=cv.width=innerWidth;HH=cv.height=innerHeight;mkPts()}
    class Pt{
        constructor(){this.x=Math.random()*W;this.y=Math.random()*HH;
            this.r=Math.random()*1.5+.2;this.vx=(Math.random()-.5)*.3;
            this.vy=(Math.random()-.5)*.3;this.h=Math.random()>.5?185:270;
            this.a=Math.random()*.5+.15;this.phase=Math.random()*Math.PI*2}
        upd(){
            this.x+=this.vx;this.y+=this.vy;this.phase+=.015;
            if(tp.x!==null){
                const dx=this.x-tp.x,dy=this.y-tp.y,d=Math.sqrt(dx*dx+dy*dy);
                if(d<140){const f=(140-d)/140;this.vx+=(dx/d)*f*.6;this.vy+=(dy/d)*f*.6}
            }
            this.vx*=.985;this.vy*=.985;
            if(this.x<-5)this.x=W+5;if(this.x>W+5)this.x=-5;
            if(this.y<-5)this.y=HH+5;if(this.y>HH+5)this.y=-5;
        }
        drw(){
            const a=this.a*(.6+.4*Math.sin(this.phase));
            cx.beginPath();cx.arc(this.x,this.y,this.r,0,6.28);
            cx.fillStyle=`hsla(${this.h},75%,60%,${a})`;
            cx.shadowBlur=6;cx.shadowColor=`hsla(${this.h},75%,60%,.3)`;
            cx.fill();cx.shadowBlur=0;
        }
    }
    function mkPts(){pts=[];const n=Math.min(W*HH/7000,180);for(let i=0;i<n;i++)pts.push(new Pt)}
    function lines(){
        for(let i=0;i<pts.length;i++)for(let j=i+1;j<pts.length;j++){
            const dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,d2=dx*dx+dy*dy;
            if(d2<7000){cx.beginPath();cx.moveTo(pts[i].x,pts[i].y);cx.lineTo(pts[j].x,pts[j].y);
                cx.strokeStyle=`rgba(0,240,255,${(1-d2/7000)*.06})`;cx.lineWidth=.4;cx.stroke()}
        }
    }
    function anim(){cx.clearRect(0,0,W,HH);pts.forEach(p=>{p.upd();p.drw()});lines();requestAnimationFrame(anim)}
    addEventListener('resize',rsz);rsz();anim();

    // ═══ Touch System ═══
    const mkRpl=(x,y)=>{
        const e=document.createElement('div');e.className='rpl';
        const h=Math.random()>.5?'185,75%,60%':'270,75%,60%';
        e.style.cssText=`left:${x-125}px;top:${y-125}px;background:radial-gradient(circle,hsla(${h},.2) 0%,transparent 70%)`;
        document.body.appendChild(e);setTimeout(()=>e.remove(),700);
    };
    document.addEventListener('touchstart',e=>{
        const t=e.touches[0];tp.x=t.clientX;tp.y=t.clientY;mkRpl(t.clientX,t.clientY);
    },{passive:true});
    document.addEventListener('touchmove',e=>{tp.x=e.touches[0].clientX;tp.y=e.touches[0].clientY},{passive:true});
    document.addEventListener('touchend',()=>{tp.x=null;tp.y=null});
    document.addEventListener('mousemove',e=>{tp.x=e.clientX;tp.y=e.clientY});
    document.addEventListener('mouseleave',()=>{tp.x=null;tp.y=null});

    // ═══ 3D Tilt ═══
    const card=document.getElementById('card');
    document.addEventListener('mousemove',e=>{
        card.style.transform=`rotateY(${(innerWidth/2-e.clientX)/28}deg) rotateX(${(innerHeight/2-e.clientY)/28}deg)`;
    });
    document.addEventListener('mouseleave',()=>{card.style.transform='none'});
    if(window.DeviceOrientationEvent){
        addEventListener('deviceorientation',e=>{
            const x=e.gamma?Math.min(Math.max(e.gamma/4,-10),10):0;
            const y=e.beta?Math.min(Math.max((e.beta-45)/4,-10),10):0;
            card.style.transform=`rotateY(${x}deg) rotateX(${-y}deg)`;
        });
    }

    // ═══ Channel Haptic ═══
    document.getElementById('chCard').addEventListener('touchstart',()=>{
        if(H)H.impactOccurred('light');
    },{passive:true});

    // ═══ Core Logic (🔒 SECURED) ═══
    const lck=document.getElementById('lck'),orb=document.getElementById('orb');
    const mbtn=document.getElementById('mbtn'),mbl=document.getElementById('mbl');
    const rbtn=document.getElementById('rbtn'),toast=document.getElementById('toast');
    const steps=document.querySelectorAll('.prog-step');
    let sent=false;

    // Orb Easter Egg
    orb.addEventListener('click',()=>{
        if(H)H.impactOccurred('heavy');
        lck.classList.add('open');lck.textContent='🔓';
        setTimeout(()=>{lck.classList.remove('open');lck.textContent='🔒'},1200);
    });

    function showT(m,t){toast.textContent=m;toast.className=`toast on ${t}`;
        if(t!=='ld')setTimeout(()=>toast.classList.remove('on'),4000)}

    function setStep(n){steps.forEach((s,i)=>{
        s.className='prog-step'+(i<n?' done':'')+(i===n?' active':'')});}

    // SDK Polling
    let sdkOk=false,ck=0;
    const poll=setInterval(()=>{ck++;
        if(typeof show_10682642==='function'){sdkOk=true;log('SDK ✅');clearInterval(poll)}
        else if(ck>15){log('SDK ⏰');clearInterval(poll)}
    },1000);

    // Confetti burst
    function confetti(){
        const emojis=['🎉','⭐','🔥','💎','✨','🏆','🚀','💜'];
        for(let i=0;i<25;i++){
            setTimeout(()=>{
                const e=document.createElement('div');e.className='confetti';
                e.textContent=emojis[Math.floor(Math.random()*emojis.length)];
                e.style.left=Math.random()*100+'vw';e.style.top=-20+'px';
                e.style.animationDuration=(1.5+Math.random())+'s';
                document.body.appendChild(e);setTimeout(()=>e.remove(),3000);
            },i*60);
        }
    }

    // 🔒 Success ONLY from Promise.resolve
    function onOk(){
        if(sent)return;sent=true;
        if(H){H.notificationOccurred('success');H.impactOccurred('heavy')}
        lck.textContent='🔓';lck.classList.add('open');
        setStep(3);
        confetti();
        // Burst ripples
        for(let i=0;i<20;i++)setTimeout(()=>mkRpl(
            innerWidth/2+(Math.random()-.5)*250,
            innerHeight/2+(Math.random()-.5)*250),i*40);
        showT('✅ تم بنجاح! جاري العودة...','ok');
        log('→ sendData');
        tg.sendData('view_completed');
        setTimeout(()=>tg.close(),1500);
    }

    mbtn.onclick=function(){
        if(H)H.impactOccurred('medium');
        mbtn.disabled=true;mbl.textContent='⏳ جاري التحميل...';
        setStep(1);
        showT('تهيئة الإعلان...','ld');log('Ad req');
        let trig=false;
        const safe=setTimeout(()=>{
            if(!trig){log('timeout');rbtn.style.display='block';
                showT('تعذر الاتصال. أعد المحاولة.','er');
                mbtn.style.display='none';
                if(H)H.notificationOccurred('warning');setStep(1)}
        },8000);

        if(typeof show_10682642==='function'){
            try{
                show_10682642().then(()=>{
                    trig=true;clearTimeout(safe);setStep(2);
                    log('Ad ✅');onOk();
                }).catch(err=>{
                    trig=true;clearTimeout(safe);
                    log('Ad ❌ '+err);showT('خطأ. حاول مرة أخرى.','er');
                    mbtn.disabled=false;mbl.textContent='🔄 إعادة المحاولة';
                    if(H)H.notificationOccurred('error');setStep(1);
                });
            }catch(e){
                trig=true;clearTimeout(safe);
                log('Exc '+e);showT('تعذر تحميل الإعلان.','er');
                mbtn.disabled=false;mbl.textContent='🔄 إعادة المحاولة';
                if(H)H.notificationOccurred('error');setStep(1);
            }
        }else{log('No SDK');showT('جاري الاتصال...','ld')}
    };

    rbtn.onclick=function(){
        if(H)H.impactOccurred('medium');
        rbtn.style.display='none';mbtn.style.display='block';
        mbtn.disabled=false;mbl.textContent='▶ شاهد العرض للفتح';
        setStep(1);showT('حاول مرة أخرى...','ld');
    };

    document.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});
})();
</script>
</body>
</html>
