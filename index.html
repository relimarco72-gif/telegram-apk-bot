<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AEMODE SYSTEM</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; background: #050508; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; height: 100vh; display: flex; align-items: center; justify-content: center; }
        #bg-canvas { position: fixed; top: 0; left: 0; z-index: -1; }
        .card { background: rgba(10, 10, 20, 0.7); border: 2px solid #00e5ff; border-radius: 30px; padding: 40px 30px; text-align: center; backdrop-filter: blur(15px); box-shadow: 0 0 40px rgba(0, 229, 255, 0.3), inset 0 0 20px rgba(0, 229, 255, 0.1); width: 85%; max-width: 380px; position: relative; z-index: 10; }
        h1 { font-size: 32px; font-weight: 900; letter-spacing: 4px; background: linear-gradient(90deg, #00e5ff, #b900ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0 0 10px; text-shadow: 0 0 20px rgba(0, 229, 255, 0.5); }
        p { font-size: 14px; color: #a0a0b0; margin-bottom: 30px; line-height: 1.6; }
        
        /* تصميم القفل التفاعلي */
        .lock-container { font-size: 60px; margin-bottom: 20px; cursor: pointer; display: inline-block; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); user-select: none; filter: drop-shadow(0 0 15px rgba(255, 215, 0, 0.6)); }
        .lock-container:active { transform: scale(0.8); }

        .btn { background: linear-gradient(45deg, #00e5ff, #0077ff); border: none; color: white; padding: 18px 30px; border-radius: 50px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.4s; box-shadow: 0 10px 20px rgba(0, 229, 255, 0.3); width: 100%; position: relative; overflow: hidden; }
        .btn::after { content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent); transition: 0.5s; }
        .btn:hover::after { left: 100%; }
        .btn:active { transform: translateY(5px); box-shadow: 0 5px 10px rgba(0, 229, 255, 0.2); }
        .btn:disabled { background: #333; color: #888; box-shadow: none; cursor: not-allowed; }

        .status-msg { margin-top: 20px; font-size: 13px; color: #ff3366; font-weight: bold; display: none; text-shadow: 0 0 10px rgba(255, 51, 102, 0.5); }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    
    <div class="card">
        <div id="lockIcon" class="lock-container" onclick="interactLock()">🔒</div>
        
        <h1>AEMODE</h1>
        <p>النظام محمي ومقفل. لفك التشفير عن الملف للجميع، يرجى تفعيل بروتوكول الإعلانات.</p>
        
        <button id="adBtn" class="btn" onclick="startFlow()" disabled>⏳ جاري تهيئة النظام...</button>
        <div id="errorMsg" class="status-msg">⚠️ جاري محاولة الاتصال بخوادم الإعلانات...</div>
    </div>

    <script>
        const tele = window.Telegram.WebApp;
        tele.ready();
        tele.expand();

        // 1. التفاعل الأسطوري مع القفل
        function interactLock() {
            const lock = document.getElementById('lockIcon');
            // اهتزاز خفيف عند اللمس
            if (tele.HapticFeedback) tele.HapticFeedback.impactOccurred('light');
            
            lock.style.transform = 'scale(1.3) rotate(10deg)';
            setTimeout(() => {
                lock.innerText = lock.innerText === '🔒' ? '🔓' : '🔒';
                lock.style.transform = 'scale(1) rotate(0deg)';
                if (tele.HapticFeedback) tele.HapticFeedback.impactOccurred('medium');
            }, 200);
        }

        // 2. الحقن الديناميكي لسكريبت Monetag (الحل الجذري لمشكلة التعليق)
        function injectAdScript() {
            return new Promise((resolve, reject) => {
                const script = document.createElement('script');
                script.src = 'https://alwingulla.com/act/files/tag.min.js?z=10682642';
                script.dataset.cfasync = 'false';
                script.async = true;
                script.onload = () => resolve();
                script.onerror = () => reject();
                document.head.appendChild(script);
            });
        }

        // 3. مراقب تحميل الإعلان
        let adReady = false;
        function checkAdStatus() {
            const btn = document.getElementById('adBtn');
            const error = document.getElementById('errorMsg');
            
            if (typeof show_10682642 === 'function') {
                adReady = true;
                btn.disabled = false;
                btn.innerText = "⚡ فتح القفل الآن";
                btn.style.boxShadow = "0 0 30px rgba(0, 229, 255, 0.6)";
                error.style.display = "none";
            } else {
                setTimeout(checkAdStatus, 1000); // استمر في الفحص كل ثانية
            }
        }

        // بدء محاولة تحميل السكريبت فور فتح الصفحة
        injectAdScript().then(() => {
            checkAdStatus();
        }).catch(() => {
            document.getElementById('errorMsg').style.display = 'block';
            document.getElementById('errorMsg').innerText = "⚠️ فشل تحميل النظام، يرجى إيقاف مانع الإعلانات.";
        });

        // 4. دالة التشغيل عند الضغط على الزر
        function startFlow() {
            if (!adReady) return;
            
            const btn = document.getElementById('adBtn');
            const lock = document.getElementById('lockIcon');
            btn.disabled = true;
            btn.innerText = "📺 جاري عرض الإعلان...";

            show_10682642().then(() => {
                // عند نجاح الإعلان
                lock.innerText = '🔓'; // فتح القفل إجبارياً
                lock.style.filter = 'drop-shadow(0 0 20px #00ff00)';
                btn.innerText = "✅ تم فك التشفير!";
                btn.style.background = "linear-gradient(45deg, #00ff00, #00aa00)";
                
                if (tele.HapticFeedback) tele.HapticFeedback.notificationOccurred('success');
                
                // إرسال الإشارة للبوت
                tele.sendData('view_completed');
                setTimeout(() => tele.close(), 1500);
            }).catch(() => {
                // إذا أغلق المستخدم الإعلان قبل انتهائه
                btn.disabled = false;
                btn.innerText = "❌ فشل! أعد المحاولة";
                if (tele.HapticFeedback) tele.HapticFeedback.notificationOccurred('error');
            });
        }

        // 5. أنميشن جزيئات AEMODE الفضائية
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let particles = Array.from({length: 80}, () => ({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 2 + 0.5,
            speedX: (Math.random() - 0.5) * 1.5,
            speedY: (Math.random() - 0.5) * 1.5
        }));

        function drawParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                ctx.fillStyle = 'rgba(0, 229, 255, 0.8)';
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
                p.x += p.speedX; p.y += p.speedY;
                if(p.x < 0 || p.x > canvas.width) p.speedX *= -1;
                if(p.y < 0 || p.y > canvas.height) p.speedY *= -1;
            });
            requestAnimationFrame(drawParticles);
        }
        drawParticles();
    </script>
</body>
</html>
