<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AEMODE - Unlock System</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Monetag Rewarded Interstitial SDK -->
    <script src="https://alwingulla.com/88/tag.min.js" data-zone="10682642" async></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --ae-blue: #4f46e5;
            --ae-violet: #a855f7;
            --ae-cyan: #22d3ee;
            --ae-dark: #030014;
            --ae-glass: rgba(255, 255, 255, 0.04);
            --ae-border: rgba(255, 255, 255, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--ae-dark);
            color: #fff;
            font-family: 'Outfit', sans-serif;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ───── Animated Star Background ───── */
        #starfield {
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        /* ───── Main Card ───── */
        .viewport {
            position: relative;
            z-index: 10;
            width: 92%;
            max-width: 420px;
        }

        .card {
            background: var(--ae-glass);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--ae-border);
            border-radius: 36px;
            padding: 45px 28px 35px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        /* Glow ring behind card */
        .card::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 38px;
            background: linear-gradient(135deg, var(--ae-blue), var(--ae-violet), var(--ae-cyan));
            z-index: -1;
            opacity: 0.25;
            filter: blur(20px);
            animation: glowPulse 4s ease-in-out infinite alternate;
        }

        @keyframes glowPulse {
            0% {
                opacity: 0.15;
            }

            100% {
                opacity: 0.35;
            }
        }

        /* ───── Lock Icon ───── */
        .lock-container {
            margin-bottom: 25px;
        }

        .lock-icon {
            font-size: 64px;
            display: inline-block;
            filter: drop-shadow(0 0 20px var(--ae-violet));
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer;
        }

        .lock-icon.unlocked {
            transform: scale(1.3) rotate(-15deg);
        }

        /* ───── Brand ───── */
        .brand {
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 6px;
            color: var(--ae-cyan);
            text-transform: uppercase;
            margin-bottom: 8px;
            opacity: 0.7;
        }

        .title {
            font-size: 26px;
            font-weight: 900;
            background: linear-gradient(90deg, #818cf8, var(--ae-violet), var(--ae-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
        }

        .desc {
            font-size: 15px;
            line-height: 1.65;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 35px;
        }

        /* ───── Main Button ───── */
        .btn-primary {
            position: relative;
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 60px;
            font-family: 'Outfit', sans-serif;
            font-size: 17px;
            font-weight: 700;
            color: #fff;
            cursor: pointer;
            background: linear-gradient(135deg, var(--ae-blue), var(--ae-violet));
            box-shadow: 0 8px 25px rgba(79, 70, 229, 0.35);
            transition: transform 0.25s, box-shadow 0.25s;
            overflow: hidden;
        }

        .btn-primary:active {
            transform: scale(0.96);
        }

        .btn-primary:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            filter: saturate(0.3);
        }

        /* Shimmer on button */
        .btn-primary::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -60%;
            width: 220%;
            height: 200%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.08), transparent);
            transform: rotate(25deg);
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0% {
                left: -60%;
            }

            100% {
                left: 120%;
            }
        }

        /* ───── Manual Fallback Button ───── */
        .btn-manual {
            display: none;
            width: 100%;
            padding: 16px;
            margin-top: 14px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 60px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--ae-cyan);
            font-family: 'Outfit', sans-serif;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn-manual:active {
            transform: scale(0.97);
        }

        /* ───── Status Feedback ───── */
        .status {
            margin-top: 20px;
            padding: 10px 18px;
            border-radius: 14px;
            font-size: 14px;
            display: none;
        }

        .status.error {
            display: block;
            background: rgba(239, 68, 68, 0.12);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #f87171;
        }

        .status.success {
            display: block;
            background: rgba(34, 197, 94, 0.12);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #4ade80;
        }

        .status.loading {
            display: block;
            background: rgba(99, 102, 241, 0.12);
            border: 1px solid rgba(99, 102, 241, 0.3);
            color: #a5b4fc;
        }

        .footer {
            margin-top: 25px;
            font-size: 11px;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>

<body>

    <canvas id="starfield"></canvas>

    <div class="viewport">
        <div class="card">
            <div class="lock-container">
                <span class="lock-icon" id="lockIcon">🔒</span>
            </div>
            <div class="brand">AEMODE</div>
            <div class="title">ساهم في فك القفل</div>
            <p class="desc">شاهد إعلاناً قصيراً لتساهم في فتح الملف<br>للجميع في القناة مجاناً.</p>

            <button class="btn-primary" id="mainBtn">
                <span id="btnText">📹 شاهد الإعلان الآن</span>
            </button>

            <button class="btn-manual" id="manualBtn">⚡ تشغيل يدوي</button>

            <div class="status" id="statusBox"></div>
            <div class="footer">AEMODE UNLOCK SYSTEM v2.0</div>
        </div>
    </div>

    <script>
        // ═══════════════════════════════════
        //  Telegram WebApp Bridge
        // ═══════════════════════════════════
        const tele = window.Telegram.WebApp;
        tele.expand();
        tele.ready();

        // ═══════════════════════════════════
        //  Animated Star Background
        // ═══════════════════════════════════
        (function () {
            const c = document.getElementById('starfield');
            const ctx = c.getContext('2d');
            let stars = [];

            function resize() {
                c.width = innerWidth;
                c.height = innerHeight;
                stars = Array.from({ length: 100 }, () => ({
                    x: Math.random() * c.width,
                    y: Math.random() * c.height,
                    r: Math.random() * 1.5 + 0.5,
                    dx: (Math.random() - 0.5) * 0.3,
                    dy: (Math.random() - 0.5) * 0.3,
                    hue: Math.random() > 0.5 ? 260 : 200,
                    alpha: Math.random() * 0.6 + 0.2
                }));
            }

            function draw() {
                ctx.clearRect(0, 0, c.width, c.height);
                stars.forEach(s => {
                    s.x += s.dx; s.y += s.dy;
                    if (s.x < 0) s.x = c.width;
                    if (s.x > c.width) s.x = 0;
                    if (s.y < 0) s.y = c.height;
                    if (s.y > c.height) s.y = 0;
                    s.alpha += (Math.random() - 0.5) * 0.02;
                    s.alpha = Math.max(0.1, Math.min(0.8, s.alpha));
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                    ctx.fillStyle = `hsla(${s.hue}, 80%, 70%, ${s.alpha})`;
                    ctx.fill();
                });
                requestAnimationFrame(draw);
            }

            addEventListener('resize', resize);
            resize();
            draw();
        })();

        // ═══════════════════════════════════
        //  Lock Interaction
        // ═══════════════════════════════════
        const lockIcon = document.getElementById('lockIcon');
        lockIcon.addEventListener('click', () => {
            if (tele.HapticFeedback) tele.HapticFeedback.impactOccurred('heavy');
            lockIcon.classList.toggle('unlocked');
            lockIcon.textContent = lockIcon.classList.contains('unlocked') ? '🔓' : '🔒';
            setTimeout(() => {
                lockIcon.classList.remove('unlocked');
                lockIcon.textContent = '🔒';
            }, 800);
        });

        // ═══════════════════════════════════
        //  Ad Engine & Bot Bridge
        // ═══════════════════════════════════
        const mainBtn = document.getElementById('mainBtn');
        const btnText = document.getElementById('btnText');
        const manualBtn = document.getElementById('manualBtn');
        const statusBox = document.getElementById('statusBox');

        function setStatus(msg, type) {
            statusBox.className = 'status ' + type;
            statusBox.textContent = msg;
        }

        function sendSuccess() {
            if (tele.HapticFeedback) tele.HapticFeedback.notificationOccurred('success');
            lockIcon.textContent = '🔓';
            lockIcon.classList.add('unlocked');
            setStatus('✅ تم التوثيق! جاري إرسال النتيجة للبوت...', 'success');
            tele.sendData('view_completed');
            setTimeout(() => tele.close(), 1500);
        }

        function resetAll() {
            mainBtn.disabled = false;
            btnText.textContent = '📹 شاهد الإعلان الآن';
            manualBtn.style.display = 'none';
        }

        mainBtn.onclick = function () {
            if (tele.HapticFeedback) tele.HapticFeedback.impactOccurred('medium');
            mainBtn.disabled = true;
            btnText.textContent = '⏳ جاري تحميل الإعلان...';
            setStatus('⏳ جاري الاتصال بخادم الإعلانات...', 'loading');
            manualBtn.style.display = 'none';

            let resolved = false;

            // ⏱ Timeout: show manual button after 7s
            const timer = setTimeout(() => {
                if (!resolved) {
                    manualBtn.style.display = 'block';
                    setStatus('⚠️ الإعلان يأخذ وقتاً طويلاً. جرب التشغيل اليدوي.', 'error');
                    btnText.textContent = '📹 شاهد الإعلان الآن';
                    mainBtn.disabled = false;
                }
            }, 7000);

            // 🎬 Try Monetag
            if (typeof show_10682642 === 'function') {
                show_10682642().then(() => {
                    resolved = true;
                    clearTimeout(timer);
                    sendSuccess();
                }).catch(() => {
                    resolved = true;
                    clearTimeout(timer);
                    manualBtn.style.display = 'block';
                    setStatus('⚠️ فشل تحميل الإعلان. اضغط التشغيل اليدوي.', 'error');
                    mainBtn.disabled = false;
                    btnText.textContent = '📹 حاول مرة أخرى';
                });
            } else {
                // SDK not loaded yet — show manual after timeout
                // Timer already running, do nothing extra
            }
        };

        // ⚡ Manual fallback
        manualBtn.onclick = function () {
            if (tele.HapticFeedback) tele.HapticFeedback.impactOccurred('heavy');
            manualBtn.disabled = true;
            manualBtn.textContent = '⏳ جاري المعالجة...';
            setStatus('⏳ جاري إرسال الإشارة يدوياً...', 'loading');

            // Try one more time
            if (typeof show_10682642 === 'function') {
                show_10682642().then(() => {
                    sendSuccess();
                }).catch(() => {
                    // Even if it fails, send the data as manual override
                    sendSuccess();
                });
            } else {
                // Last resort: direct send
                sendSuccess();
            }
        };
    </script>
</body>

</html>
