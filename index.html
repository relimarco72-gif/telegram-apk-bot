<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium Unlock</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root { --primary: #00d2ff; --secondary: #3a7bd5; --accent: #ff007a; }
        body { margin: 0; padding: 0; background: #050505; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; height: 100vh; touch-action: none; }
        #canvas { position: fixed; top: 0; left: 0; z-index: 1; }
        .container { position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; padding: 20px; backdrop-filter: blur(5px); }
        .glass-card { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px; padding: 40px 20px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); width: 90%; max-width: 400px; transform: translateY(0); transition: 0.5s; }
        h1 { font-size: 24px; margin-bottom: 15px; background: linear-gradient(45deg, var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn-neon { background: linear-gradient(45deg, var(--primary), var(--secondary)); border: none; padding: 15px 40px; border-radius: 50px; color: white; font-weight: bold; font-size: 18px; cursor: pointer; box-shadow: 0 0 20px rgba(0, 210, 255, 0.4); transition: 0.3s; position: relative; overflow: hidden; margin-top: 20px; }
        .btn-neon:active { transform: scale(0.95); box-shadow: 0 0 40px rgba(0, 210, 255, 0.8); }
        .timer { font-size: 40px; font-weight: bold; margin: 20px 0; color: var(--accent); display: none; text-shadow: 0 0 15px var(--accent); }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="container">
        <div class="glass-card" id="card">
            <div id="status-icon" style="font-size: 60px; margin-bottom: 20px;">💎</div>
            <h1>فتح المحتوى الحصري</h1>
            <p id="msg">للحصول على الملف، يرجى مشاهدة الإعلان كاملاً وانتظار العداد.</p>
            
            <button class="btn-neon" id="adBtn" onclick="startAd()">⚡ بدء المشاهدة الآن</button>
            <div class="timer" id="timer">15</div>
        </div>
    </div>

    <script>
        const tele = window.Telegram.WebApp;
        tele.expand();

        // نظام الجزيئات المتبع للبصمة
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        class Particle {
            constructor(x, y) {
                this.x = x; this.y = y;
                this.size = Math.random() * 5 + 1;
                this.speedX = Math.random() * 3 - 1.5;
                this.speedY = Math.random() * 3 - 1.5;
                this.color = `hsl(${Math.random() * 360}, 70%, 50%)`;
            }
            update() { this.x += this.speedX; this.y += this.speedY; if (this.size > 0.2) this.size -= 0.1; }
            draw() { ctx.fillStyle = this.color; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); }
        }

        window.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            for (let i = 0; i < 10; i++) particles.push(new Particle(touch.clientX, touch.clientY));
            tele.HapticFeedback.impactOccurred('medium');
        });

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, i) => { p.update(); p.draw(); if (p.size <= 0.2) particles.splice(i, 1); });
            requestAnimationFrame(animate);
        }
        animate();

        // منطق الإعلان والعداد
        function startAd() {
            show_10682642().then(() => {
                document.getElementById('adBtn').style.display = 'none';
                const timerEl = document.getElementById('timer');
                timerEl.style.display = 'block';
                let count = 15;
                
                const interval = setInterval(() => {
                    count--;
                    timerEl.innerText = count;
                    if (count <= 0) {
                        clearInterval(interval);
                        timerEl.innerHTML = "✅ اكتمل";
                        tele.sendData('view_completed');
                        setTimeout(() => tele.close(), 1000);
                    }
                }, 1000);
            }).catch(() => {
                alert("يجب إكمال الإعلان بالكامل!");
                tele.HapticFeedback.notificationOccurred('error');
            });
        }
    </script>
    </body>
</html>
