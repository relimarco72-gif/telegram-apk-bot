<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ANTIGRAVITY SYSTEM</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; background: #0a0a0f; color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; display: flex; align-items: center; justify-content: center; }
        #bg-canvas { position: fixed; top: 0; left: 0; z-index: -1; }
        .card { background: rgba(15, 15, 25, 0.8); border: 1px solid #00f2ff; border-radius: 25px; padding: 30px; text-align: center; backdrop-filter: blur(10px); box-shadow: 0 0 30px rgba(0, 242, 255, 0.2); width: 85%; max-width: 350px; }
        h1 { font-size: 28px; letter-spacing: 3px; background: linear-gradient(90deg, #00f2ff, #ff00ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0 0 20px; }
        .btn { background: none; border: 2px solid #00f2ff; color: #00f2ff; padding: 15px 30px; border-radius: 50px; font-size: 18px; cursor: pointer; transition: 0.3s; box-shadow: inset 0 0 10px rgba(0, 242, 255, 0.2); width: 100%; }
        .btn:disabled { border-color: #555; color: #555; }
        .status-msg { margin-top: 15px; font-size: 12px; color: #ff4444; display: none; }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    <div class="card">
        <h1>ANTIGRAVITY</h1>
        <p>ادعم المجتمع بمشاهدة إعلان مكافأة.<br>سيتم فك القفل عن الملف للجميع فوراً.</p>
        <button id="adBtn" class="btn" onclick="startFlow()">⚡ تشغيل النظام</button>
        <div id="errorMsg" class="status-msg">⚠️ تعذر الاتصال بالخادم، جاري إعادة المحاولة...</div>
    </div>

    <script src='https://alwingulla.com/act/files/tag.min.js?z=10682642' data-cfasync='false' async></script>

    <script>
        const tele = window.Telegram.WebApp;
        tele.ready();
        tele.expand();

        function startFlow() {
            const btn = document.getElementById('adBtn');
            const error = document.getElementById('errorMsg');
            btn.disabled = true;
            btn.innerText = "⏳ جاري التحميل...";

            if (typeof show_10682642 === 'function') {
                show_10682642().then(() => {
                    tele.sendData('view_completed');
                    tele.HapticFeedback.notificationOccurred('success');
                    setTimeout(() => tele.close(), 1000);
                }).catch(() => {
                    resetBtn("⚠️ فشل الإعلان");
                });
            } else {
                error.style.display = 'block';
                setTimeout(() => resetBtn("🔄 إعادة المحاولة"), 3000);
            }
        }

        function resetBtn(txt) {
            const btn = document.getElementById('adBtn');
            btn.disabled = false;
            btn.innerText = txt;
        }

        // أنميشن الخلفية (النقاط المتحركة)
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        let particles = Array.from({length: 50}, () => ({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            v: Math.random() * 0.5 + 0.2
        }));
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#00f2ff';
            particles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, 1, 0, Math.PI * 2);
                ctx.fill();
                p.y -= p.v;
                if (p.y < 0) p.y = canvas.height;
            });
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
